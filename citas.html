<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Citas</title>
  <link rel="stylesheet" href="public/css/styles.css">
</head>
<body>

<header class="header">
  <h1>Agendar Cita</h1>
</header>

<main>
  <form action="confirmacion.html" class="form">

    <label>Nombre</label>
    <input type="text" required>

    <label>Mascota</label>
    <input type="text" required>

    <label>Servicio</label>
    <select>
      <option>Baño</option>
      <option>Vacunación</option>
      <option>Consulta</option>
    </select>

    <label>Fecha</label>
    <input type="date" required>

    <button type="submit">Agendar</button>

  </form>
</main>

</body>
</html>
